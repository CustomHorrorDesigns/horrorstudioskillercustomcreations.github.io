<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Horror Studios Killer Custom Creations</title>

<!-- CSS Link (keep your style.css if you have one) -->
<link rel="stylesheet" href="style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">

<style>
/* ------------------------
   BODY
------------------------ */
body {
  margin: 0;
  padding: 0;
  background: #111;
  font-family: Arial, sans-serif;
  color: #e74c3c;
  overflow-x: hidden;
  position: relative;
}

/* ------------------------
   FOG OVERLAY
------------------------ */
.fog {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('assets/fog.png') repeat;
  opacity: 0.3;
  pointer-events: none;
  z-index: 1; /* behind everything */
}

/* ------------------------
   HEADER / LOGO
------------------------ */
.logo-header {
  position: relative;
  display: block;
  width: 100%;
  text-align: center;
  margin-top: 50px;
  z-index: 5; /* above fog */
}

.logo {
  display: block;
  max-width: 300px;
  width: 50%;
  height: auto;
  margin: 0 auto;
  cursor: pointer; /* clickable */
  z-index: 5;
}

/* ------------------------
   BLOOD POOL
------------------------ */
.blood-pool {
  position: absolute;
  bottom: -10px;
  left: 0;
  width: 100%;
  height: 50px;
  background: #4B0000;
  border-radius: 0 0 50% 50%;
  overflow: visible;
  z-index: 2;
}

/* BLOOD DRIPS */
.drip {
  position: absolute;
  bottom: 100%;
  width: 10px;
  height: 50px;
  background: #8B0000;
  clip-path: polygon(
    50% 0%, 60% 20%, 40% 40%, 55% 60%, 45% 80%, 50% 100%, 40% 90%, 60% 70%, 50% 50%, 55% 30%
  );
  animation: drip-fall 2s infinite ease-in-out;
}

.drip1 { left: 10%; animation-delay: 0s; }
.drip2 { left: 25%; animation-delay: 0.4s; }
.drip3 { left: 45%; animation-delay: 0.8s; }
.drip4 { left: 65%; animation-delay: 1.2s; }
.drip5 { left: 85%; animation-delay: 1.6s; }

@keyframes drip-fall {
  0%, 20% { transform: scaleY(0); }
  50% { transform: scaleY(1.3); }
  80%, 100% { transform: scaleY(1); }
}

/* ------------------------
   HORROR CARDS
------------------------ */
.horror-card {
  max-width: 800px;
  margin: 40px auto;
  padding: 25px;
  background: #1a0000;
  border: 2px solid #8b0000;
  border-radius: 10px;
  color: #e74c3c;
  box-shadow: 0 0 20px rgba(139,0,0,0.7);
  transition: 0.3s;
}

.horror-card:hover {
  box-shadow: 0 0 30px red, 0 0 60px darkred;
  transform: scale(1.02);
}

/* ------------------------
   CAROUSEL
------------------------ */
.scroll-container {
  overflow: hidden;
  width: 100%;
  padding: 20px 0;
}

.scroll-track {
  display: flex;
  gap: 15px;
  animation: scroll 20s linear infinite;
}

.scroll-track img:hover {
  animation: glitchAnim 0.3s infinite;
  transform: scale(1.1);
  box-shadow: 0 0 20px #e74c3c, 0 0 40px #8B0000;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

@keyframes glitchAnim {
  0% { transform: translate(0,0) scale(1.1);}
  20% { transform: translate(-2px, 2px) scale(1.1);}
  40% { transform: translate(2px, -2px) scale(1.1);}
  60% { transform: translate(-2px, -2px) scale(1.1);}
  80% { transform: translate(2px, 2px) scale(1.1);}
  100% { transform: translate(0,0) scale(1.1);}
}

/* ------------------------
   HEADLINES
------------------------ */
h1 {
  font-family: 'Metal Mania', cursive;
  color: #e74c3c;
  text-align: center;
  text-shadow: 2px 2px 8px #000;
  font-size: 3em;
  z-index: 2;
  position: relative;
}
</style>
</head>

<body>

<!-- ------------------------
     FOG OVERLAY
------------------------ -->
<div class="fog"></div>

<!-- ------------------------
     LOGO HEADER
------------------------ -->
<header class="logo-header">
  <img src="assets/logo.png" class="logo" id="logo" alt="Logo">
  <div class="blood-pool">
    <div class="drip drip1"></div>
    <div class="drip drip2"></div>
    <div class="drip drip3"></div>
    <div class="drip drip4"></div>
    <div class="drip drip5"></div>
  </div>
</header>

<!-- DEMON LAUGH AUDIO -->
<audio id="demonLaugh" src="assets/demon-laugh.mp3"></audio>

<!-- ------------------------
     MAIN CONTENT
------------------------ -->
<h1>Horror Studios Killer Custom Creations</h1>
<p class="headline-caption">
  From classic 80’s horror to spine chilling modern films, we bring modern horror to life.
</p>

<!-- HORROR CARDS -->
<div class="horror-card">
  <h2>About Us</h2>
  <p>Welcome to Horror Studios Killer Custom Creations...</p>
</div>

<!-- CAROUSEL -->
<div class="scroll-container">
  <div class="scroll-track">
    <!-- all 22 images, DO NOT rename -->
    <img src="images/Untitled%20design-2.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-3.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-4.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-5.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-6.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-7.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-8.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-9.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-10.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-11.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-12.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-13.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-14.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-15.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-16.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-17.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-18.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-19.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-20.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-21.png" onclick="openLightbox(this.src)">
    <img src="images/Untitled%20design-22.png" onclick="openLightbox(this.src)">
  </div>
</div>

<!-- ------------------------
     SCRIPT
------------------------ -->
<script>
// DEMON LAUGH
const logo = document.getElementById('logo');
const laugh = document.getElementById('demonLaugh');

logo.addEventListener('click', () => {
  laugh.currentTime = 0;
  laugh.play();
});

// LIGHTBOX
let currentIndex = 0;
let images = Array.from(document.querySelectorAll('.scroll-track img'));

function openLightbox(src) {
  images = Array.from(document.querySelectorAll('.scroll-track img'));
  currentIndex = images.findIndex(img => img.src === src);
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

function changeImage(direction) {
  currentIndex += direction;
  if(currentIndex < 0) currentIndex = images.length - 1;
  if(currentIndex >= images.length) currentIndex = 0;
  document.getElementById("lightbox-img").src = images[currentIndex].src;
}
</script>

<!-- LIGHTBOX HTML (keep as-is) -->
<div id="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <span class="prev" onclick="changeImage(-1)">❮</span>
  <img id="lightbox-img">
  <span class="next" onclick="changeImage(1)">❯</span>
</div>

</body>
</html>
