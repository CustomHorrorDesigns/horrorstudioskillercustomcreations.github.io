<!DOCTYPE html>
<html>
<head>
    <title>Horror Studios Killer Custom Creations</title>

    <style>
        body {
            background: black;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            text-align: center;    
        }

        .logo {
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
        }

        .tagline {
            color: #ff00ff;
            margin: 20px;
            font-size: 18px;
        }

        .product {
            border: 2px solid #ff00ff;
            margin: 20px;
            padding: 15px;
            display: inline-block;
            width: 230px;
            background: #111;
            box-shadow: 0 0 15px #ff00ff;
            border-radius: 8px;
        }

        .product img {
            width: 100%;
            border-radius: 5px;
        }

        .price {
            color: red;
            font-size: 18px;
            margin-top: 5px;
        }

        button {
            background-color: red;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            border-radius: 5px;
        }

        button:hover {
            background-color: #ff3333;
        }

        .custom {
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid #333;
        }

        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
        }

        .footer {
            margin-top: 40px;
            color: #555;
        }
    </style>
</head>

<body>

<!-- 🔥 YOUR LOGO -->
<img src="logo.png" class="logo">

<p class="tagline">Handmade Horror Gear • Built to Kill</p>

<!-- PRODUCTS -->

<div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Slasher Tee</h3>
    <p class="price">$25</p>
    <button onclick="window.location.href='https://paypal.me/YOURNAME'">
        BUY IF YOU DARE
    </button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Horror Tumbler</h3>
    <p class="price">$20</p>
    <button onclick="window.location.href='https://paypal.me/YOURNAME'">
        BUY IF YOU DARE
    </button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Sticker Pack</h3>
    <p class="price">$10</p>
    <button onclick="window.location.href='https://paypal.me/YOURNAME'">
        BUY IF YOU DARE
    </button>
</div>

<!-- CUSTOM ORDERS -->

<div class="custom">
    <h2 style="color:red;">Request a Custom Piece</h2>
    <p>Want something killer made just for you?</p>

    <input type="text" placeholder="Your Name"><br>
    <input type="text" placeholder="Email"><br>
    <textarea placeholder="Describe your custom design..."></textarea><br>

    <button onclick="alert('Message us on Facebook or Instagram to order!')">
        Submit Request
    </button>
</div>

<div class="footer">
    ⚰️ Horror Studios • Killer Custom Creations ⚰️
</div>

</body>
</html>
