<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Horror Studios Killer Custom Creations</title>

    <!-- Metal Mania font for header -->
    <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">

    <style>
        /* ===== Body & general ===== */
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        /* ===== Fog Layer ===== */
        .fog {
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.2;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.15) 0%, transparent 60%),
                        radial-gradient(circle at 80% 50%, rgba(255,255,255,0.1) 0%, transparent 70%),
                        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.08) 0%, transparent 70%);
            animation: fogMove 60s linear infinite;
        }

        @keyframes fogMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ===== Content above fog ===== */
        .content {
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        /* ===== Header ===== */
        h1 {
            font-family: 'Metal Mania', cursive;
            color: #e74c3c;
            text-shadow: 2px 2px 8px #000;
            font-size: 3em;
            text-align: center;
        }

        /* ===== Scroll Gallery ===== */
        .scroll-container {
            overflow-x: auto;
            overflow-y: hidden;
            width: 100%;
            margin-top: 50px;
        }

        .scroll-track {
            display: flex;
            gap: 1rem;
            width: max-content;
            animation: scroll 40s linear infinite;
        }

        .scroll-track img {
            width: 150px;
            border: 2px solid #e74c3c;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s, filter 0.3s;
        }

        /* Horror hover + glitch */
        .scroll-track img:hover {
            transform: scale(1.1) rotate(-1deg);
            box-shadow: 0 0 20px #e74c3c, 0 0 40px #8b0000;
            filter: brightness(1.2) contrast(1.3);
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0) scale(1.1); }
            20% { transform: translate(-2px, 2px) scale(1.1); }
            40% { transform: translate(2px, -2px) scale(1.1); }
            60% { transform: translate(-2px, -2px) scale(1.1); }
            80% { transform: translate(2px, 2px) scale(1.1); }
            100% { transform: translate(0) scale(1.1); }
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ===== Lightbox ===== */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid #e74c3c;
        }

        .close, .prev, .next {
            position: absolute;
            font-size: 40px;
            color: white;
            cursor: pointer;
            user-select: none;
            top: 50%;
            transform: translateY(-50%);
        }

        .close { top: 20px; right: 30px; font-size: 50px; }
        .prev { left: 20px; }
        .next { right: 20px; }

        /* ===== Demon Head ===== */
        #demon {
            position: fixed;
            width: 120px;
            top: 20%;
            left: 10%;
            z-index: 999;
            pointer-events: none;
            animation: floatDemon 6s ease-in-out infinite, glitchDemon 0.2s infinite;
            opacity: 0.9;
        }

        @keyframes floatDemon {
            0% { transform: translate(0,0) rotate(0deg);}
            25% { transform: translate(20px,-30px) rotate(5deg);}
            50% { transform: translate(-20px,20px) rotate(-5deg);}
            75% { transform: translate(30px,10px) rotate(3deg);}
            100% { transform: translate(0,0) rotate(0deg);}
        }
        @keyframes glitchDemon {
            0% { filter:none; }
            20% { filter: contrast(2) hue-rotate(20deg); }
            40% { filter: invert(1); }
            60% { filter: contrast(3); }
            80% { filter: hue-rotate(-20deg); }
            100% { filter:none; }
        }
    </style>
</head>
<body>

            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <span class="close" onclick="closeLightbox()">×</span>
        <span class="prev" onclick="changeImage(-1)">❮</span>
        <img id="lightbox-img">
        <span class="next" onclick="changeImage(1)">❯</span>
    </div>

    <!-- Demon head -->
    <img id="demon" src="https://i.ibb.co/4pDNDk1/demon.png">

    <!-- Scripts -->
    <script>
        // Lightbox
        let currentIndex = 0;
        let images = Array.from(document.querySelectorAll('.scroll-track img'));

        function openLightbox(src) {
            images = Array.from(document.querySelectorAll('.scroll-track img'));
            currentIndex = images.findIndex(img => img.src === src);
            document.getElementById("lightbox").style.display = "flex";
            document.getElementById("lightbox-img").src = src;
        }

        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
        }

        function changeImage(direction) {
            currentIndex += direction;
            if(currentIndex < 0) currentIndex = images.length - 1;
            if(currentIndex >= images.length) currentIndex = 0;
            document.getElementById("lightbox-img").src = images[currentIndex].src;
        }
    </script>
